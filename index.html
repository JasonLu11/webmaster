<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多页面导航</title>
    <style>
        body {
            background: #222;
            color: #fff;
            font-family: '微软雅黑', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            margin-bottom: 40px;
        }
        .nav {
            display: flex;
            gap: 40px;
        }
        .nav a {
            display: block;
            padding: 30px 60px;
            background: #444;
            color: #fff;
            text-decoration: none;
            font-size: 28px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
            transition: background 0.2s, transform 0.2s;
        }
        .nav a:hover {
            background: #00bfff;
            color: #222;
            transform: translateY(-4px) scale(1.05);
        }
    </style>
</head>
<body>
    <h1>多页面导航</h1>
    <div class="nav">
        <a href="/xrk/" target="_blank">XRK页面</a>
        <a href="/todesk/" target="_blank">ToDesk页面</a>
    </div>
</body>
</html>
