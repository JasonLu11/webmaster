<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>图片跳转页面</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    body {
      width: 100vw;
      height: 100vh;
    }
    #main-img {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      cursor: pointer;
      display: block;
    }
  </style>
</head>
<body>
  <img id="main-img" src="yuanshen.png" alt="主图">
  <script>
    document.getElementById('main-img').onclick = function() {
      window.location.href = 'https://h5.salamspin.com/';
    }
  </script>
</body>
</html>
